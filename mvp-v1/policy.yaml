    - PI-001a   # Prompt Injection direct (BLOCK)
    - PI-001b   # Prompt Injection filesystem
    - PI-002    # Memory-resident payload activation
    - MA-001    # Multi-agent trust escalation
    - MA-002    # Unauthorized agent spawn
    - MEM-001   # Memory entry skill-loading directive
    - CG-001    # Completion gate
    - CG-002    # Commit gate
    - CQ-001    # Post-edit lint missing
    - DI-001    # Action on truncated data
    - OQ-001    # Rationalization detection
    - OQ-002    # Output format drift
    - BR-001    # Diff blast radius
    - SI-003    # Sub-skill depth limit
    - SI-004    # Skill-to-memory write isolation
    - SI-005    # Memory-resident skill directive

  ml_models:
    - exfil_behavior
    - dependency_risk
    - system_call_risk_classifier
    - autonomy_drift_detector
    - memory_directive_classifier
    - rationalization_detector
    - output_format_drift_detector

  integrations:
    psa: [autotask, halopsa, syncro]
    siem: [sentinel, splunk, elastic, qradar]
    rmm: [ninjaone, datto, n-able, kaseya, connectwise-rmm]
